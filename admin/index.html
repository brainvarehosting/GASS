        colors: {

          teal:  { 50:'#f0fbfb', 100:'#e0f7f7', 200:'#b8ecec', 300:'#85dcdc', 500:'#13b8b8', 600:'#0e9595', 700:'#0a7575', 800:'#075c5c', 900:'#054444' },
          gold:  { 300:'#fcd34d', 400:'#fbbf24', 500:'#f59e0b', 600:'#d97706' },

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body{font-family:'Inter',sans-serif;background:#f6f8fa;}
  [x-cloak]{display:none}
  .scrollbar-thin::-webkit-scrollbar{height:6px;width:6px}
  .scrollbar-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
  textarea.auto{field-sizing:content;min-height:60px;}
  .pill{display:inline-flex;align-items:center;padding:.15rem .55rem;border-radius:999px;font-size:.7rem;font-weight:600;line-height:1.2}
  .nav-item{display:flex;align-items:center;gap:.65rem;padding:.55rem .85rem;border-radius:.5rem;color:#cbd5e1;font-size:.9rem;cursor:pointer;transition:all .15s}
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav-item.active{background:linear-gradient(135deg,#13b8b8,#0a7575);color:#fff;box-shadow:0 4px 14px -4px rgba(19,184,184,.55)}
  .nav-section{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:#64748b;font-weight:600;padding:1.25rem .85rem .35rem}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:.85rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem .95rem;border-radius:.55rem;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .12s;border:1px solid transparent;}
  .btn-primary{background:#0a7575;color:#fff}
  .btn-primary:hover{background:#075c5c}
  .btn-ghost{background:transparent;color:#0a7575;border-color:#0a7575}
  .btn-ghost:hover{background:#f0fbfb}
  .btn-danger{background:#dc2626;color:#fff}
  .btn-danger:hover{background:#b91c1c}
  .input{width:100%;padding:.55rem .8rem;border:1px solid #d1d5db;border-radius:.5rem;font-size:.9rem;background:#fff;transition:border-color .12s,box-shadow .12s;}
  .input:focus{outline:none;border-color:#13b8b8;box-shadow:0 0 0 3px rgba(19,184,184,.18)}
  .toast{position:fixed;top:1.25rem;right:1.25rem;z-index:50;padding:.85rem 1.1rem;border-radius:.6rem;background:#0b1f2a;color:#fff;font-size:.88rem;box-shadow:0 12px 30px -10px rgba(0,0,0,.35);transform:translateX(120%);transition:transform .25s ease;}
  .toast.show{transform:translateX(0)}
  .toast.error{background:#dc2626}
  .toast.success{background:#0a7575}
  .skeleton{background:linear-gradient(90deg,#e5e7eb 0%,#f3f4f6 50%,#e5e7eb 100%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:.4rem;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body class="text-slate-800">

<!-- ============== APP SHELL ============== -->
<div id="appView" class="hidden min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-60 bg-ink-900 text-white flex-shrink-0 flex flex-col">
    <div class="p-5 border-b border-white/10">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-md bg-gradient-to-br from-teal-500 to-teal-700 flex items-center justify-center font-bold text-sm">GA</div>
        <div>
          <div class="font-semibold text-sm">GASF Admin</div>
          <div class="text-[.7rem] text-slate-400">CMS Lite v1</div>
        </div>
      </div>
    </div>
    <nav class="flex-1 px-3 py-2 overflow-y-auto">
      <div class="nav-section">Overview</div>
      <div class="nav-item active" data-route="dashboard">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </div>
      <div class="nav-section">Forms &amp; Leads</div>
      <div class="nav-item" data-route="submissions">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Submissions
      </div>
      <div class="nav-section">Website</div>
      <div class="nav-item" data-route="content">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        Page Content
      </div>
      <div class="nav-item" data-route="media">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Media Library
      </div>
      <div class="nav-item" data-route="banners">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
        Hero Banners
      </div>
      <div class="nav-section">Coming next</div>
      <div class="nav-item opacity-50 cursor-not-allowed">Form builder</div>
      <div class="nav-item opacity-50 cursor-not-allowed">Page builder</div>

    <div class="p-3 border-t border-white/10">
      <button id="logoutBtn" class="nav-item w-full">

        Sign out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between">
      <h1 id="pageTitle" class="text-lg font-semibold text-ink-900">Dashboard</h1>
      <div class="flex items-center gap-2 text-xs text-slate-500">
        <span class="hidden sm:inline">Live site:</span>
        <a href="https://gasf-website.pages.dev" target="_blank" class="text-teal-700 font-semibold hover:underline">gasf-website.pages.dev →</a>

<div id="toast" class="toast">…</div>

<!-- ============== APP SCRIPT ============== -->
<script>
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const api = {
  async get(path)            { return r(await fetch(path, {credentials:'include'})); },
  async post(path, body)     { return r(await fetch(path, {method:'POST', credentials:'include', headers:{'content-type':'application/json'}, body: JSON.stringify(body||{})})); },
  async put(path, body)      { return r(await fetch(path, {method:'PUT', credentials:'include', headers:{'content-type':'application/json'}, body: JSON.stringify(body||{})})); },
  async patch(path, body)    { return r(await fetch(path, {method:'PATCH', credentials:'include', headers:{'content-type':'application/json'}, body: JSON.stringify(body||{})})); },
  async del(path)            { return r(await fetch(path, {method:'DELETE', credentials:'include'})); },
};
async function r(res) {
  let body = {};
  try { body = await res.json(); } catch {}
  if (!res.ok) {
    const err = new Error(body.error || res.statusText);
    err.status = res.status;
    err.body = body;
    throw err;
  }
  return body;
}

const toast = (msg, kind='success') => {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show ' + kind;
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2800);
};

// ---------- Auth bootstrap ----------
async function bootstrap() {
  try {
    await api.get('/api/auth/me');
    showApp();
  } catch (e) {
    showLogin();
  }
}

function showLogin() {
  $('#loginView').classList.remove('hidden');
  $('#appView').classList.add('hidden');
}
function showApp() {
  $('#loginView').classList.add('hidden');
  $('#appView').classList.remove('hidden');
  navigate('dashboard');
}

$('#loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pwd = $('#loginPassword').value;
  $('#loginBtnText').textContent = 'Signing in…';
  $('#loginError').classList.add('hidden');
  try {
    await api.post('/api/auth/login', { password: pwd });
    showApp();
  } catch (err) {
    $('#loginError').textContent = err.message || 'Login failed';
    $('#loginError').classList.remove('hidden');
  } finally {
    $('#loginBtnText').textContent = 'Sign in';
  }
});

$('#logoutBtn').addEventListener('click', async () => {
  await api.post('/api/auth/logout').catch(()=>{});
  showLogin();
});

// ---------- Routing ----------
const routes = {};
function navigate(name) {
  $$('.nav-item').forEach((el) => el.classList.toggle('active', el.dataset.route === name));
  $('#pageTitle').textContent = (routes[name]?.title) || name;
  $('#viewRoot').innerHTML = '<div class="space-y-3"><div class="skeleton h-6 w-1/3"></div><div class="skeleton h-32 w-full"></div></div>';
  routes[name]?.render?.($('#viewRoot'));
}
$$('.nav-item[data-route]').forEach((el) => {
  el.addEventListener('click', () => navigate(el.dataset.route));
});

// ---------- DASHBOARD ----------
routes.dashboard = {
  title: 'Dashboard',
  async render(root) {
    let d;
    try { d = await api.get('/api/admin/dashboard'); }
    catch (e) { root.innerHTML = `<div class="card p-6 text-red-600">Failed to load: ${e.message}</div>`; return; }

    const c = d.counts;
    const card = (label, value, sub, color) => `
      <div class="card p-5">
        <div class="text-xs uppercase tracking-wider text-slate-500 font-semibold">${label}</div>
        <div class="text-3xl font-bold mt-1.5 text-ink-900">${value}</div>
        <div class="text-xs text-slate-500 mt-1">${sub}</div>
      </div>`;

    root.innerHTML = `
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        ${card('Registrations', c.registrations.total, `${c.registrations.today} today · ${c.registrations.new} new`)}
        ${card('Contact messages', c.contacts.total, `${c.contacts.today} today · ${c.contacts.new} new`)}
        ${card('Consulting enquiries', c.enquiries.total, `${c.enquiries.today} today · ${c.enquiries.new} new`)}
        ${card('Editable content keys', c.content_items, 'Across pages')}
      </div>
      <div class="card overflow-hidden">
        <div class="px-5 py-3 border-b flex items-center justify-between">
          <h3 class="font-semibold text-ink-900">Recent submissions</h3>
          <button class="btn btn-ghost text-xs py-1" onclick="navigate('submissions')">View all →</button>
        </div>
        ${d.recent.length === 0
          ? '<div class="p-10 text-center text-slate-500 text-sm">No submissions yet.</div>'
          : `<div class="divide-y">${d.recent.map(rowDashboard).join('')}</div>`}
      </div>`;
  }
};

function rowDashboard(s) {
  return `
    <div class="px-5 py-3 flex items-center gap-4 hover:bg-slate-50">
      <span class="pill bg-${tableColor(s.table_name)}">${tableLabel(s.table_name)}</span>
      <div class="flex-1 min-w-0">
        <div class="font-medium text-sm text-ink-900 truncate">${escape(s.name)}</div>
        <div class="text-xs text-slate-500 truncate">${escape(s.email||'')} ${s.phone?'· '+escape(s.phone):''} ${s.subject?'· '+escape(s.subject):''}</div>
      </div>
      <div class="text-xs text-slate-400 whitespace-nowrap">${formatDate(s.created_at)}</div>
      ${statusPill(s.status)}
    </div>`;
}

const tableLabel = (t) => ({registrations:'Registration', contacts:'Contact', enquiries:'Enquiry'}[t] || t);
const tableColor = (t) => ({registrations:'amber-100 text-amber-800', contacts:'sky-100 text-sky-800', enquiries:'emerald-100 text-emerald-800'}[t] || 'slate-100 text-slate-800');

function statusPill(s) {
  const map = {
    new:'bg-blue-100 text-blue-700',
    viewed:'bg-slate-100 text-slate-700',
    contacted:'bg-yellow-100 text-yellow-800',
    converted:'bg-emerald-100 text-emerald-700',
    spam:'bg-red-100 text-red-700',
    archived:'bg-slate-200 text-slate-600',
  };
  return `<span class="pill ${map[s]||'bg-slate-100 text-slate-700'}">${s}</span>`;
}

const escape = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso.replace(' ', 'T') + (iso.includes('Z') ? '' : 'Z'));
  if (isNaN(d)) return iso;
  return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

// ---------- SUBMISSIONS ----------
routes.submissions = {
  title: 'Submissions',
  state: { table:'', status:'', q:'', limit:50, offset:0 },
  async render(root) {
    const s = routes.submissions.state;
    root.innerHTML = `
      <div class="card p-4 mb-4">
        <div class="flex flex-wrap gap-2 items-center">
          <select id="fTable" class="input w-auto">
            <option value="">All forms</option>
            <option value="registrations">Registrations</option>
            <option value="contacts">Contact messages</option>
            <option value="enquiries">Consulting enquiries</option>
          </select>
          <select id="fStatus" class="input w-auto">
            <option value="">All statuses</option>
            <option value="new">New</option>
            <option value="viewed">Viewed</option>
            <option value="contacted">Contacted</option>
            <option value="converted">Converted</option>
            <option value="spam">Spam</option>
            <option value="archived">Archived</option>
          </select>
          <input id="fQ" class="input flex-1 min-w-[200px]" placeholder="Search name, email, phone, message…"/>
          <button id="fApply" class="btn btn-primary">Filter</button>
          <div class="flex-1"></div>
          <button id="exportReg"  class="btn btn-ghost text-xs">⤓ Registrations CSV</button>
          <button id="exportCt"   class="btn btn-ghost text-xs">⤓ Contacts CSV</button>
          <button id="exportEnq"  class="btn btn-ghost text-xs">⤓ Enquiries CSV</button>
        </div>
      </div>
      <div id="subTable" class="card overflow-hidden"></div>
      <div id="subPager" class="mt-4 flex items-center justify-between text-sm text-slate-600"></div>`;

    $('#fTable').value = s.table; $('#fStatus').value = s.status; $('#fQ').value = s.q;
    $('#fApply').addEventListener('click', () => {
      s.table = $('#fTable').value; s.status = $('#fStatus').value; s.q = $('#fQ').value; s.offset = 0;
      load();
    });
    $('#fQ').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#fApply').click(); });
    $('#exportReg').addEventListener('click', () => { window.location = '/api/admin/submissions/export?table=registrations'; });
    $('#exportCt').addEventListener('click',  () => { window.location = '/api/admin/submissions/export?table=contacts'; });
    $('#exportEnq').addEventListener('click', () => { window.location = '/api/admin/submissions/export?table=enquiries'; });

    async function load() {
      const params = new URLSearchParams();
      if (s.table) params.set('table', s.table);
      if (s.status) params.set('status', s.status);
      if (s.q) params.set('q', s.q);
      params.set('limit', s.limit); params.set('offset', s.offset);
      $('#subTable').innerHTML = '<div class="p-10 text-center text-slate-400 text-sm">Loading…</div>';
      try {
        const res = await api.get('/api/admin/submissions?' + params.toString());
        renderTable(res);
      } catch (e) {
        $('#subTable').innerHTML = `<div class="p-10 text-center text-red-600 text-sm">Error: ${e.message}</div>`;
      }
    }

    function renderTable(res) {
      if (!res.items.length) {
        $('#subTable').innerHTML = '<div class="p-10 text-center text-slate-500 text-sm">No submissions match these filters.</div>';
        $('#subPager').textContent = '';
        return;
      }
      const rowsHtml = res.items.map((it) => `
        <tr class="border-t hover:bg-slate-50">
          <td class="px-4 py-3"><span class="pill bg-${tableColor(it.table_name)}">${tableLabel(it.table_name)}</span></td>
          <td class="px-4 py-3">
            <div class="font-medium text-sm">${escape(it.name)}</div>
            <div class="text-xs text-slate-500">${escape(it.email||'')}${it.phone?' · '+escape(it.phone):''}</div>
          </td>
          <td class="px-4 py-3 text-sm">${escape(it.organisation||'—')}</td>
          <td class="px-4 py-3 text-sm max-w-xs truncate">${escape(it.subject||'—')}</td>
          <td class="px-4 py-3 text-xs text-slate-500 whitespace-nowrap">${formatDate(it.created_at)}</td>
          <td class="px-4 py-3">
            <select class="input py-1 text-xs status-sel" data-table="${it.table_name}" data-id="${it.id}">
              ${['new','viewed','contacted','converted','spam','archived'].map(st => `<option value="${st}" ${st===it.status?'selected':''}>${st}</option>`).join('')}
            </select>
          </td>
          <td class="px-4 py-3 text-right">
            <div class="inline-flex gap-1">
              <button class="btn btn-ghost text-xs py-1 view-btn" data-table="${it.table_name}" data-id="${it.id}">View</button>
              <button class="btn btn-danger text-xs py-1 del-btn"  data-table="${it.table_name}" data-id="${it.id}">Del</button>
            </div>
          </td>
        </tr>`).join('');

      $('#subTable').innerHTML = `
        <div class="overflow-x-auto scrollbar-thin">
          <table class="min-w-full text-left">
            <thead class="bg-slate-50 text-xs uppercase tracking-wider text-slate-500">
              <tr>
                <th class="px-4 py-3 font-semibold">Form</th>
                <th class="px-4 py-3 font-semibold">Person</th>
                <th class="px-4 py-3 font-semibold">Org</th>
                <th class="px-4 py-3 font-semibold">Subject / Programme</th>
                <th class="px-4 py-3 font-semibold">Date</th>
                <th class="px-4 py-3 font-semibold">Status</th>
                <th class="px-4 py-3 font-semibold text-right">Actions</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>`;

      const start = res.offset + 1;
      const end = Math.min(res.offset + res.items.length, res.total);
      $('#subPager').innerHTML = `
        <span>Showing <strong>${start}–${end}</strong> of <strong>${res.total}</strong></span>
        <div class="flex gap-2">
          <button id="pgPrev" class="btn btn-ghost text-xs py-1" ${res.offset === 0 ? 'disabled style="opacity:.4"':''}>← Prev</button>
          <button id="pgNext" class="btn btn-ghost text-xs py-1" ${end >= res.total ? 'disabled style="opacity:.4"':''}>Next →</button>
        </div>`;
      $('#pgPrev')?.addEventListener('click', () => { s.offset = Math.max(0, s.offset - s.limit); load(); });
      $('#pgNext')?.addEventListener('click', () => { s.offset = s.offset + s.limit; load(); });

      $$('.status-sel').forEach((el) => el.addEventListener('change', async () => {
        try {
          await api.patch(`/api/admin/submissions/${el.dataset.table}/${el.dataset.id}`, { status: el.value });
          toast('Status updated');
        } catch (e) { toast(e.message, 'error'); }
      }));
      $$('.view-btn').forEach((el) => el.addEventListener('click', () => openDetail(el.dataset.table, el.dataset.id)));
      $$('.del-btn').forEach((el) => el.addEventListener('click', async () => {
        if (!confirm('Delete this submission permanently?')) return;
        try {
          await api.del(`/api/admin/submissions/${el.dataset.table}/${el.dataset.id}`);
          toast('Deleted');
          load();

const MEDIA_CATEGORIES = ['general','banners','services','team','book','brochures','blogs','testimonials','events'];

routes.media = {
  title: 'Media Library',

  async render(root) {
    const s = routes.media.state;
    root.innerHTML = `
      <div class="card p-4 mb-4">
        <div class="flex flex-wrap gap-2 items-center">
          <select id="mCategory" class="input w-auto">
            <option value="">All categories</option>
            ${MEDIA_CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('')}

          <label class="btn btn-primary cursor-pointer">

          </label>
        </div>
        <div class="mt-3 flex items-center gap-2 text-xs text-slate-600">
          <span>Upload to category:</span>
          <select id="mUploadCategory" class="input w-auto py-1">
            ${MEDIA_CATEGORIES.map(c => `<option value="${c}" ${c===s.uploadCategory?'selected':''}>${c}</option>`).join('')}
          </select>
          <span class="text-slate-400">· max 10 MB per file · images, PDF, MP4/WebM</span>
        </div>
      </div>
      <div id="mDrop" class="card p-12 mb-4 border-2 border-dashed border-slate-300 text-center text-slate-500 text-sm hidden">
        Drop files here to upload
      </div>
      <div id="mUploads" class="space-y-2 mb-4"></div>
      <div id="mGrid" class="card p-4 min-h-[200px]"></div>`;

    $('#mCategory').value = s.category;
    $('#mQ').value = s.q;
    $('#mFilter').addEventListener('click', () => { s.category = $('#mCategory').value; s.q = $('#mQ').value; load(); });
    $('#mQ').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#mFilter').click(); });
    $('#mUploadCategory').addEventListener('change', (e) => { s.uploadCategory = e.target.value; });
    $('#mUpload').addEventListener('change', (e) => uploadFiles(e.target.files));

    // Drag-drop
    const drop = $('#mDrop');
    let dragDepth = 0;
    document.addEventListener('dragenter', (e) => { e.preventDefault(); if (++dragDepth === 1) drop.classList.remove('hidden'); });
    document.addEventListener('dragleave', () => { if (--dragDepth <= 0) { dragDepth = 0; drop.classList.add('hidden'); } });
    document.addEventListener('dragover', (e) => e.preventDefault());
    document.addEventListener('drop', (e) => {
      e.preventDefault();
      dragDepth = 0;
      drop.classList.add('hidden');
      if (e.dataTransfer?.files?.length) uploadFiles(e.dataTransfer.files);
    });

    async function uploadFiles(files) {
      const list = $('#mUploads');
      for (const file of files) {
        const row = document.createElement('div');
        row.className = 'card px-4 py-3 flex items-center gap-3 text-sm';
        row.innerHTML = `<div class="flex-1 truncate"><strong>${escape(file.name)}</strong> <span class="text-slate-400">· ${(file.size/1024).toFixed(0)} KB</span></div><div class="text-xs text-slate-500">Uploading…</div>`;
        list.prepend(row);
        try {
          const fd = new FormData();
          fd.append('file', file);
          fd.append('category', s.uploadCategory);
          const res = await fetch('/api/admin/media', { method:'POST', credentials:'include', body: fd });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(body.error || res.statusText);
          row.querySelector('.text-xs').innerHTML = '<span class="text-emerald-600">✓ Uploaded</span>';
          setTimeout(() => row.remove(), 2000);
          load();
        } catch (err) {
          row.querySelector('.text-xs').innerHTML = `<span class="text-red-600">✗ ${escape(err.message)}</span>`;
        }
      }
    }

    async function load() {
      $('#mGrid').innerHTML = '<div class="p-10 text-center text-slate-400 text-sm">Loading…</div>';
      const params = new URLSearchParams();
      if (s.category) params.set('category', s.category);
      if (s.q) params.set('q', s.q);
      try {
        const res = await api.get('/api/admin/media?' + params.toString());
        if (!res.items.length) {
          $('#mGrid').innerHTML = '<div class="p-12 text-center text-slate-500 text-sm">No media yet. Drop files above to upload.</div>';
          return;
        }
        $('#mGrid').innerHTML = `
          <div class="text-xs text-slate-500 mb-3">${res.total} file${res.total===1?'':'s'}</div>
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
            ${res.items.map(mediaTile).join('')}
          </div>`;
        $$('#mGrid [data-id]').forEach((el) => el.addEventListener('click', () => openMediaDetail(el.dataset.id)));
      } catch (e) {
        $('#mGrid').innerHTML = `<div class="p-10 text-center text-red-600 text-sm">${e.message}</div>`;
      }
    }
    load();
  }
};

// Opens a drawer that lets the user pick an image from the Media Library.
// Returns a Promise<string|null> resolving to the public_url (or null on cancel).
function pickMedia({ category = '' } = {}) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 z-[60] bg-black/50 flex items-center justify-center p-4';
    overlay.innerHTML = `
      <div class="card max-w-4xl w-full max-h-[85vh] overflow-hidden flex flex-col">
        <div class="px-5 py-3 border-b flex items-center justify-between">
          <h3 class="font-semibold text-ink-900">Choose an image</h3>
          <button class="text-slate-400 hover:text-slate-700 text-xl leading-none close-x">×</button>
        </div>
        <div class="px-5 py-3 border-b flex flex-wrap gap-2 items-center">
          <select id="pkCat" class="input w-auto">
            <option value="">All categories</option>
            ${MEDIA_CATEGORIES.map(c => `<option value="${c}" ${c===category?'selected':''}>${c}</option>`).join('')}
          </select>
          <input id="pkQ" class="input flex-1 min-w-[160px]" placeholder="Search…"/>
          <button id="pkFilter" class="btn btn-primary">Filter</button>
          <label class="btn btn-ghost text-xs cursor-pointer">
            ⤒ Upload new
            <input id="pkUp" type="file" class="hidden" accept="image/*"/>
          </label>
        </div>
        <div id="pkGrid" class="flex-1 overflow-y-auto p-5 min-h-[200px]"></div>
      </div>`;
    document.body.appendChild(overlay);

    const close = (val) => { overlay.remove(); resolve(val); };
    overlay.addEventListener('click', (e) => { if (e.target === overlay || e.target.classList.contains('close-x')) close(null); });

    async function load() {
      const params = new URLSearchParams();
      const cat = overlay.querySelector('#pkCat').value;
      const q   = overlay.querySelector('#pkQ').value;
      if (cat) params.set('category', cat);
      if (q)   params.set('q', q);
      params.set('limit', '120');
      overlay.querySelector('#pkGrid').innerHTML = '<div class="text-center text-slate-400 text-sm py-12">Loading…</div>';
      try {
        const res = await api.get('/api/admin/media?' + params.toString());
        const grid = overlay.querySelector('#pkGrid');
        if (!res.items.length) {
          grid.innerHTML = '<div class="text-center text-slate-500 text-sm py-12">No media. Upload from the Media Library tab or via the upload button above.</div>';
          return;
        }
        grid.innerHTML = `
          <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3">
            ${res.items.map((m) => `
              <button type="button" data-url="${m.public_url}" class="group text-left">
                <div class="relative aspect-square bg-slate-100 rounded-lg overflow-hidden border border-slate-200 group-hover:ring-2 group-hover:ring-teal-500 transition">
                  ${/^image\//.test(m.mime_type)
                    ? `<img src="${m.public_url}" alt="" class="absolute inset-0 w-full h-full object-cover"/>`
                    : `<div class="absolute inset-0 flex items-center justify-center text-slate-400 text-xs uppercase">${(m.mime_type||'file').split('/')[1]}</div>`}
                </div>
                <div class="mt-1 text-xs truncate">${escape(m.filename)}</div>
              </button>`).join('')}
          </div>`;
        grid.querySelectorAll('button[data-url]').forEach((b) => b.addEventListener('click', () => close(b.dataset.url)));
      } catch (e) {
        overlay.querySelector('#pkGrid').innerHTML = `<div class="text-center text-red-600 text-sm py-12">${e.message}</div>`;
      }
    }

    overlay.querySelector('#pkFilter').addEventListener('click', load);
    overlay.querySelector('#pkQ').addEventListener('keydown', (e) => { if (e.key === 'Enter') load(); });
    overlay.querySelector('#pkUp').addEventListener('change', async (e) => {
      const f = e.target.files?.[0]; if (!f) return;
      const fd = new FormData();
      fd.append('file', f);
      fd.append('category', overlay.querySelector('#pkCat').value || category || 'general');
      try {
        const res = await fetch('/api/admin/media', { method:'POST', credentials:'include', body: fd });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.error || res.statusText);
        toast('Uploaded');
        close(body.public_url);
      } catch (err) { toast(err.message, 'error'); }
    });

    load();
  });
}

const BG_TYPES = [
  { v:'image',         label:'Image' },
  { v:'image_overlay', label:'Image + overlay' },
  { v:'gradient',      label:'Gradient' },
  { v:'solid',         label:'Solid color' },

routes.banners = {
  title: 'Hero Banners',
  async render(root) {
    let res;
    try { res = await api.get('/api/admin/banners'); }
    catch (e) { root.innerHTML = `<div class="card p-6 text-red-600">Failed to load: ${e.message}</div>`; return; }

    root.innerHTML = `
      <div class="mb-4 flex items-center justify-between">
        <p class="text-sm text-slate-600">Active banners appear on the homepage hero, in this order. Drag to reorder. If no banners are active, the homepage falls back to the static slides.</p>
        <button id="bAdd" class="btn btn-primary">+ New banner</button>
      </div>
      <div id="bList" class="space-y-3"></div>`;

    function renderList(items) {
      const list = $('#bList');
      if (!items.length) {
        list.innerHTML = '<div class="card p-12 text-center text-slate-500 text-sm">No banners yet. Click "New banner" to create one — until you add an active banner, the homepage uses the existing static slides.</div>';
        return;
      }
      list.innerHTML = items.map(bannerRow).join('');

      // drag-reorder
      list.querySelectorAll('.b-row').forEach((row) => {
        row.draggable = true;
        row.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/id', row.dataset.id); row.classList.add('opacity-50'); });
        row.addEventListener('dragend',   () => row.classList.remove('opacity-50'));
        row.addEventListener('dragover',  (e) => { e.preventDefault(); row.classList.add('ring-2','ring-teal-500'); });
        row.addEventListener('dragleave', () => row.classList.remove('ring-2','ring-teal-500'));
        row.addEventListener('drop', async (e) => {
          e.preventDefault();
          row.classList.remove('ring-2','ring-teal-500');
          const fromId = e.dataTransfer.getData('text/id');
          if (!fromId || fromId === row.dataset.id) return;
          const ids = [...list.querySelectorAll('.b-row')].map((r) => r.dataset.id);
          const fromIdx = ids.indexOf(fromId);
          const toIdx   = ids.indexOf(row.dataset.id);
          ids.splice(toIdx, 0, ids.splice(fromIdx, 1)[0]);
          try {
            await api.post('/api/admin/banners/reorder', { order: ids.map(Number) });
            toast('Order saved');
            navigate('banners');
          } catch (err) { toast(err.message, 'error'); }
        });
      });

      list.querySelectorAll('.b-edit')   .forEach((b) => b.addEventListener('click', () => openBanner(parseInt(b.dataset.id, 10))));
      list.querySelectorAll('.b-toggle') .forEach((b) => b.addEventListener('click', async () => {
        try { await api.put('/api/admin/banners/' + b.dataset.id, { is_active: b.dataset.active === '1' ? 0 : 1 }); navigate('banners'); }
        catch (err) { toast(err.message, 'error'); }
      }));
      list.querySelectorAll('.b-del').forEach((b) => b.addEventListener('click', async () => {
        if (!confirm('Delete this banner permanently?')) return;
        try { await api.del('/api/admin/banners/' + b.dataset.id); toast('Deleted'); navigate('banners'); }
        catch (err) { toast(err.message, 'error'); }
      }));
    }

    renderList(res.items);

    $('#bAdd').addEventListener('click', () => openBanner(null));
  }
};

function bannerRow(b) {
  const thumb = b.bg_image_url
    ? `<img src="${b.bg_image_url}" class="w-24 h-16 object-cover rounded-md border border-slate-200"/>`
    : `<div class="w-24 h-16 rounded-md flex items-center justify-center text-[.65rem] text-slate-500 uppercase tracking-wider" style="${bgPreviewStyle(b)}">${b.bg_type}</div>`;
  return `
    <div class="b-row card p-3 flex items-center gap-4 cursor-move" data-id="${b.id}">
      <div class="text-slate-300 select-none">⋮⋮</div>
      ${thumb}
      <div class="flex-1 min-w-0">
        <div class="text-sm font-semibold text-ink-900 truncate">${escape(b.heading || '(untitled)')}</div>
        <div class="text-xs text-slate-500 truncate">${escape(b.eyebrow || '')} ${b.description ? '· ' + escape(b.description.slice(0,80)) : ''}</div>
      </div>
      <span class="pill ${b.is_active ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}">${b.is_active ? 'Active' : 'Hidden'}</span>
      <div class="inline-flex gap-1">
        <button class="btn btn-ghost text-xs py-1 b-toggle" data-id="${b.id}" data-active="${b.is_active}">${b.is_active ? 'Hide' : 'Show'}</button>
        <button class="btn btn-ghost text-xs py-1 b-edit"   data-id="${b.id}">Edit</button>
        <button class="btn btn-danger text-xs py-1 b-del"    data-id="${b.id}">Del</button>
      </div>
    </div>`;
}

function bgPreviewStyle(b) {
  if (b.bg_type === 'solid') return `background:${b.bg_color || '#0b1f2a'};color:#fff;`;
  if (b.bg_type === 'gradient') return `background:linear-gradient(135deg, ${b.bg_gradient_from || '#0b1f2a'}, ${b.bg_gradient_to || '#0a7575'});color:#fff;`;
  return 'background:#e2e8f0;';
}

async function openBanner(id) {
  const isNew = !id;
  let item = {
    eyebrow: '', heading: '', heading_accent: '', description: '',
    btn1_text: '', btn1_link: '', btn2_text: '', btn2_link: '',
    bg_type: 'image_overlay', bg_image_url: '', bg_image_mobile_url: '', bg_video_url: '',
    bg_color: '#0b1f2a', bg_gradient_from: '#0b1f2a', bg_gradient_to: '#0a7575',
    overlay_opacity: 0.55, text_align: 'left', text_color: '', is_active: 1,
  };
  if (!isNew) {
    try { const { item: row } = await api.get('/api/admin/banners/' + id); item = { ...item, ...row }; }
    catch (e) { toast(e.message, 'error'); return; }
  }

  const overlay = document.createElement('div');
  overlay.className = 'fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4';
  overlay.innerHTML = `
    <form id="bForm" class="card max-w-4xl w-full max-h-[92vh] overflow-hidden flex flex-col">
      <div class="px-5 py-3 border-b flex items-center justify-between">
        <h3 class="font-semibold text-ink-900">${isNew ? 'New banner' : 'Edit banner #' + id}</h3>
        <button type="button" class="text-slate-400 hover:text-slate-700 text-xl leading-none close-x">×</button>
      </div>
      <div class="p-5 overflow-y-auto flex-1 space-y-5">

        <!-- Live preview -->
        <div id="bPreview" class="rounded-xl overflow-hidden border border-slate-200 relative" style="min-height:200px;"></div>

        <!-- Text content -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <label class="block">
            <span class="block text-xs font-semibold text-slate-700 mb-1">Eyebrow / badge text</span>
            <input class="input bf" name="eyebrow" value="${escape(item.eyebrow||'')}"/>
          </label>
          <label class="block">
            <span class="block text-xs font-semibold text-slate-700 mb-1">Text alignment</span>
            <select class="input bf" name="text_align">
              <option value="left"   ${item.text_align==='left'?'selected':''}>Left</option>
              <option value="center" ${item.text_align==='center'?'selected':''}>Center</option>
              <option value="right"  ${item.text_align==='right'?'selected':''}>Right</option>
            </select>
          </label>
          <label class="block md:col-span-2">
            <span class="block text-xs font-semibold text-slate-700 mb-1">Heading <span class="text-red-500">*</span></span>
            <input class="input bf" name="heading" required value="${escape(item.heading||'')}"/>
          </label>
          <label class="block md:col-span-2">
            <span class="block text-xs font-semibold text-slate-700 mb-1">Heading accent (optional, shown after heading in accent color)</span>
            <input class="input bf" name="heading_accent" value="${escape(item.heading_accent||'')}"/>
          </label>
          <label class="block md:col-span-2">
            <span class="block text-xs font-semibold text-slate-700 mb-1">Description</span>
            <textarea class="input bf auto" name="description" rows="3">${escape(item.description||'')}</textarea>
          </label>
        </div>

        <!-- Buttons -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <fieldset class="border border-slate-200 rounded-lg p-3">
            <legend class="text-xs font-semibold text-slate-700 px-2">Primary button</legend>
            <input class="input bf mb-2" name="btn1_text" placeholder="Button text" value="${escape(item.btn1_text||'')}"/>
            <input class="input bf"      name="btn1_link" placeholder="Link (e.g. services.html)" value="${escape(item.btn1_link||'')}"/>
          </fieldset>
          <fieldset class="border border-slate-200 rounded-lg p-3">
            <legend class="text-xs font-semibold text-slate-700 px-2">Secondary button</legend>
            <input class="input bf mb-2" name="btn2_text" placeholder="Button text" value="${escape(item.btn2_text||'')}"/>
            <input class="input bf"      name="btn2_link" placeholder="Link" value="${escape(item.btn2_link||'')}"/>
          </fieldset>
        </div>

        <!-- Background -->
        <fieldset class="border border-slate-200 rounded-lg p-3">
          <legend class="text-xs font-semibold text-slate-700 px-2">Background</legend>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <label class="block">
              <span class="block text-xs font-semibold text-slate-700 mb-1">Type</span>
              <select class="input bf" name="bg_type">
                ${BG_TYPES.map(t => `<option value="${t.v}" ${t.v===item.bg_type?'selected':''}>${t.label}</option>`).join('')}
              </select>
            </label>
            <label class="block">
              <span class="block text-xs font-semibold text-slate-700 mb-1">Overlay opacity (0–1, image_overlay only)</span>
              <input class="input bf" name="overlay_opacity" type="number" step="0.05" min="0" max="1" value="${item.overlay_opacity ?? 0.55}"/>
            </label>
            <div class="md:col-span-2 flex gap-2 items-end">
              <label class="block flex-1">
                <span class="block text-xs font-semibold text-slate-700 mb-1">Desktop background image URL</span>
                <input class="input bf" name="bg_image_url" value="${escape(item.bg_image_url||'')}" placeholder="https://… or /assets/…"/>
              </label>
              <button type="button" class="btn btn-ghost text-xs h-[38px] pickImg" data-target="bg_image_url">Pick</button>
            </div>
            <div class="md:col-span-2 flex gap-2 items-end">
              <label class="block flex-1">
                <span class="block text-xs font-semibold text-slate-700 mb-1">Mobile background image URL (optional)</span>
                <input class="input bf" name="bg_image_mobile_url" value="${escape(item.bg_image_mobile_url||'')}"/>
              </label>
              <button type="button" class="btn btn-ghost text-xs h-[38px] pickImg" data-target="bg_image_mobile_url">Pick</button>
            </div>
            <label class="block">
              <span class="block text-xs font-semibold text-slate-700 mb-1">Solid color (hex)</span>
              <input class="input bf" name="bg_color" type="color" value="${item.bg_color||'#0b1f2a'}"/>
            </label>
            <label class="block">
              <span class="block text-xs font-semibold text-slate-700 mb-1">Text color (hex, optional)</span>
              <input class="input bf" name="text_color" value="${item.text_color||''}" placeholder="#ffffff"/>
            </label>
            <label class="block">
              <span class="block text-xs font-semibold text-slate-700 mb-1">Gradient from</span>
              <input class="input bf" name="bg_gradient_from" type="color" value="${item.bg_gradient_from||'#0b1f2a'}"/>
            </label>
            <label class="block">
              <span class="block text-xs font-semibold text-slate-700 mb-1">Gradient to</span>
              <input class="input bf" name="bg_gradient_to" type="color" value="${item.bg_gradient_to||'#0a7575'}"/>
            </label>
            <label class="block md:col-span-2">
              <span class="block text-xs font-semibold text-slate-700 mb-1">Background video URL (mp4/webm, type=video)</span>
              <input class="input bf" name="bg_video_url" value="${escape(item.bg_video_url||'')}"/>
            </label>
          </div>
        </fieldset>

        <label class="flex items-center gap-2 text-sm">
          <input type="checkbox" class="bf" name="is_active" ${item.is_active ? 'checked' : ''}/>
          Active (show on homepage)
        </label>
      </div>
      <div class="px-5 py-3 border-t flex items-center justify-between bg-slate-50">
        <div class="text-xs text-slate-500">${isNew ? 'New banner — saves to the end of the order' : 'Saving updates the live homepage immediately'}</div>
        <div class="flex gap-2">
          <button type="button" class="btn btn-ghost text-xs close-x">Cancel</button>
          <button type="submit" class="btn btn-primary text-xs">${isNew ? 'Create banner' : 'Save changes'}</button>
        </div>
      </div>
    </form>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay || e.target.classList.contains('close-x')) overlay.remove(); });

  const form = overlay.querySelector('#bForm');
  const previewBox = overlay.querySelector('#bPreview');

  function readForm() {
    const out = {};
    form.querySelectorAll('.bf').forEach((el) => {
      const name = el.name;
      if (!name) return;
      if (el.type === 'checkbox') out[name] = el.checked ? 1 : 0;
      else if (el.type === 'number') out[name] = el.value === '' ? null : Number(el.value);
      else out[name] = el.value;
    });
    return out;
  }

  function renderPreview() {
    const d = readForm();
    let bg = '';
    if (d.bg_type === 'solid') bg = `background:${d.bg_color};`;
    else if (d.bg_type === 'gradient') bg = `background:linear-gradient(135deg, ${d.bg_gradient_from}, ${d.bg_gradient_to});`;
    else if (d.bg_type === 'image' && d.bg_image_url) bg = `background:url('${d.bg_image_url}') center/cover;`;
    else if (d.bg_type === 'image_overlay' && d.bg_image_url) bg = `background:linear-gradient(rgba(0,0,0,${d.overlay_opacity}),rgba(0,0,0,${d.overlay_opacity})), url('${d.bg_image_url}') center/cover;`;
    else if (d.bg_type === 'video') bg = 'background:#0b1f2a;';
    const color = d.text_color || '#fff';
    const align = d.text_align;
    previewBox.style.cssText = `min-height:200px; padding:2rem; color:${color}; text-align:${align}; ${bg}`;
    previewBox.innerHTML = `
      ${d.eyebrow ? `<div style="font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;opacity:.85;margin-bottom:.5rem;">${escape(d.eyebrow)}</div>` : ''}
      ${d.heading ? `<h2 style="font-size:1.6rem;font-weight:700;line-height:1.2;margin-bottom:.5rem;">${escape(d.heading)} ${d.heading_accent ? `<span style="color:#fbbf24;">${escape(d.heading_accent)}</span>` : ''}</h2>` : ''}
      ${d.description ? `<p style="opacity:.85;font-size:.9rem;max-width:560px;${align==='center'?'margin-left:auto;margin-right:auto;':''}">${escape(d.description)}</p>` : ''}
      <div style="display:flex;gap:.5rem;margin-top:1rem;${align==='center'?'justify-content:center;':align==='right'?'justify-content:flex-end;':''}">
        ${d.btn1_text ? `<span style="background:#fbbf24;color:#0b1f2a;padding:.4rem 1rem;border-radius:999px;font-size:.8rem;font-weight:600;">${escape(d.btn1_text)}</span>` : ''}
        ${d.btn2_text ? `<span style="border:1px solid rgba(255,255,255,.5);padding:.4rem 1rem;border-radius:999px;font-size:.8rem;font-weight:600;">${escape(d.btn2_text)}</span>` : ''}
      </div>`;
  }

  form.querySelectorAll('.bf').forEach((el) => el.addEventListener('input', renderPreview));
  form.querySelectorAll('.pickImg').forEach((btn) => btn.addEventListener('click', async () => {
    const url = await pickMedia({ category: 'banners' });
    if (!url) return;
    const target = form.querySelector(`input[name="${btn.dataset.target}"]`);
    target.value = url; renderPreview();
  }));
  renderPreview();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = readForm();
    if (!data.heading) { toast('Heading is required', 'error'); return; }
    try {
      if (isNew) await api.post('/api/admin/banners', data);
      else       await api.put ('/api/admin/banners/' + id, data);
      toast(isNew ? 'Banner created' : 'Saved');
      overlay.remove();
      navigate('banners');
    } catch (err) { toast(err.message, 'error'); }
  });
}

window.navigate = navigate; // expose for inline handlers

bootstrap();
</script>
</body>
</html>
