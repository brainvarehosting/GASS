<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta id="metaDescription" name="description" content="Insights from GreenApple Success Factors."/>
  <title id="metaTitle">Insight | GreenApple Success Factors</title>
  <link rel="stylesheet" href="assets/components.css"/>
  <link rel="stylesheet" href="extra.css"/>
  <meta property="og:type" content="article"/>
  <meta id="ogTitle"       property="og:title"       content=""/>
  <meta id="ogDescription" property="og:description" content=""/>
  <meta id="ogImage"       property="og:image"       content=""/>
  <style>
    .post-wrap { max-width: 760px; margin: 0 auto; padding: 0 1.25rem; }
    .post-eyebrow { display:inline-block; font-size:.7rem; letter-spacing:.18em; text-transform:uppercase; color:var(--teal-700, #0a7575); font-weight:700; margin-bottom:.75rem; }
    .post-title { font-size: clamp(1.7rem, 4vw, 2.6rem); color:var(--navy-800, #0b1f2a); line-height:1.18; margin:0 0 .75rem; font-weight:800; }
    .post-meta { color:var(--gray-500, #64748b); font-size:.88rem; margin-bottom:2rem; }
    .post-cover { width:100%; max-height: 460px; object-fit:cover; border-radius:14px; margin-bottom:2rem; }
    .post-content { font-size:1.05rem; line-height:1.8; color:var(--gray-700, #334155); }
    .post-content h2 { color:var(--navy-800, #0b1f2a); font-size:1.5rem; margin-top:2rem; margin-bottom:.6rem; line-height:1.3; }
    .post-content h3 { color:var(--navy-800, #0b1f2a); font-size:1.2rem; margin-top:1.5rem; margin-bottom:.5rem; }
    .post-content p { margin: 0 0 1rem; }
    .post-content ul, .post-content ol { margin:0 0 1rem 1.4rem; }
    .post-content li { margin-bottom:.4rem; }
    .post-content blockquote { border-left:4px solid var(--teal-500, #13b8b8); padding:.75rem 1.25rem; margin:1.5rem 0; background:var(--teal-50, #f0fbfb); color:var(--navy-800, #0b1f2a); font-style:italic; border-radius:0 8px 8px 0; }
    .post-content a { color:var(--teal-700, #0a7575); text-decoration:underline; }
    .post-content img { max-width:100%; border-radius:8px; margin:1rem 0; }
    .post-tags { margin-top: 2.5rem; padding-top: 1.5rem; border-top:1px solid var(--gray-200, #e2e8f0); display:flex; flex-wrap:wrap; gap:.4rem; }
    .post-tag { background:var(--gray-100, #f1f5f9); color:var(--gray-600, #475569); font-size:.75rem; padding:.25rem .7rem; border-radius:999px; }
    .post-back { display:inline-flex; align-items:center; gap:.4rem; color:var(--teal-700, #0a7575); text-decoration:none; font-weight:600; font-size:.9rem; margin-bottom:1.5rem; }
    .post-error { text-align:center; padding:5rem 2rem; color:var(--gray-500, #64748b); }
  </style>
</head>
<body>
  <div id="header-mount"></div>

  <section class="section" style="padding-top: clamp(2rem, 5vw, 4rem);">
    <div class="post-wrap">
      <a href="blog.html" class="post-back">← Back to insights</a>
      <article id="postArticle">
        <div class="post-error">Loading…</div>
      </article>
    </div>
  </section>

  <div id="register-cta-mount"></div>
  <div id="footer-mount"></div>
  <script src="components.js?v=5"></script>
  <script src="content-loader.js?v=5"></script>
  <script src="blog.js?v=1" defer></script>
</body>
</html>
