<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Insights on business consulting, mentoring, leadership, and strategic growth from GreenApple Success Factors."/>
  <title>Insights | GreenApple Success Factors</title>
  <link rel="stylesheet" href="assets/components.css"/>
  <link rel="stylesheet" href="extra.css"/>
  <style>
    .blog-toolbar { display:flex; flex-wrap:wrap; gap:.6rem; align-items:center; margin-bottom:2rem; }
    .blog-toolbar select, .blog-toolbar input { padding:.55rem .8rem; border:1px solid var(--gray-300, #d1d5db); border-radius:.5rem; font-size:.9rem; background:#fff; font-family:inherit; }
    .blog-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:1.5rem; }
    .blog-card { background:#fff; border:1px solid var(--gray-100, #f3f4f6); border-radius:14px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.04); transition:transform .15s ease, box-shadow .15s ease; display:flex; flex-direction:column; }
    .blog-card:hover { transform:translateY(-3px); box-shadow:0 12px 30px -10px rgba(11,31,42,.18); }
    .blog-card a { text-decoration:none; color:inherit; display:flex; flex-direction:column; height:100%; }
    .blog-card__cover { aspect-ratio:16/9; background:#f1f5f9 center/cover; }
    .blog-card__body { padding:1.1rem 1.25rem; flex:1; display:flex; flex-direction:column; }
    .blog-card__cat { font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:var(--teal-700, #0a7575); font-weight:700; margin-bottom:.4rem; }
    .blog-card__title { font-size:1.1rem; font-weight:700; color:var(--navy-800, #0b1f2a); margin:0 0 .5rem; line-height:1.3; }
    .blog-card__excerpt { font-size:.88rem; color:var(--gray-500, #64748b); line-height:1.6; margin:0 0 .8rem; flex:1; }
    .blog-card__meta { font-size:.75rem; color:var(--gray-500, #94a3b8); padding-top:.5rem; border-top:1px solid var(--gray-100, #f1f5f9); }
    .blog-pager { margin-top:2rem; display:flex; justify-content:center; gap:.5rem; }
    .blog-pager button { padding:.55rem 1rem; border:1px solid var(--teal-700, #0a7575); background:transparent; color:var(--teal-700, #0a7575); border-radius:999px; font-size:.85rem; font-weight:600; cursor:pointer; }
    .blog-pager button:disabled { opacity:.4; cursor:default; }
    .blog-empty { text-align:center; padding:5rem 2rem; color:var(--gray-500, #64748b); }
  </style>
</head>
<body>
  <div id="header-mount"></div>

  <section class="hero hero--has-bg" style="background-image:url('assets/gallery-corporate-1.jpg');">
    <h1>Insights &amp; Perspectives</h1>
    <p>Boardroom thinking, mentoring frameworks, and growth strategies from GreenApple Success Factors.</p>
  </section>

  <section class="section">
    <div class="container">
      <div class="blog-toolbar">
        <select id="bCat">
          <option value="">All categories</option>
        </select>
        <input id="bQ" type="search" placeholder="Search posts…"/>
        <button id="bFilter" class="btn-primary" style="padding:.55rem 1rem; font-size:.85rem;">Filter</button>
      </div>
      <div id="blogList" class="blog-grid">
        <div class="blog-empty">Loading…</div>
      </div>
      <div id="blogPager" class="blog-pager"></div>
    </div>
  </section>

  <div id="register-cta-mount"></div>
  <div id="footer-mount"></div>
  <script src="components.js?v=8"></script>
  <script src="content-loader.js?v=5"></script>
  <script src="blog.js?v=1" defer></script>
</body>
</html>
