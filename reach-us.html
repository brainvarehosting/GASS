<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Contact GreenApple Success Factors - Write to us for more information about our services."/>
  <title>Reach Us | GreenApple Success Factors</title>
  <link rel="stylesheet" href="assets/components.css"/>
  <link rel="stylesheet" href="extra.css"/>
</head>
<body>
  <div id="header-mount"></div>

  <section class="hero hero--has-bg" style="background-image:url('assets/abstract-pattern.png');">
    <h1>Reach Us</h1>
    <p>We'd love to hear from you. Write to us for more information about our services.</p>
  </section>

  <section class="section">
    <div class="container">
      <div class="contact-layout fade-up">
        <!-- Form -->
        <div>
          <h2 style="color:var(--teal-700);margin-bottom:1.2rem;">Write To Us</h2>
          <form id="contactForm" onsubmit="event.preventDefault(); alert('Thank you! We will get back to you soon.');">
            <div class="form-group">
              <label for="contact-name">Name</label>
              <input type="text" id="contact-name" placeholder="Your full name" required/>
            </div>
            <div class="form-group">
              <label for="contact-phone">Contact Number</label>
              <input type="tel" id="contact-phone" placeholder="Your phone number"/>
            </div>
            <div class="form-group">
              <label for="contact-email">Email</label>
              <input type="email" id="contact-email" placeholder="Your email address" required/>
            </div>
            <div class="form-group">
              <label for="contact-message">Message</label>
              <textarea id="contact-message" placeholder="Your message..." required></textarea>
            </div>
            <button type="submit" class="btn-submit">SEND</button>
          </form>
        </div>
        <!-- Info -->
        <div class="contact-info-card">
          <div class="info-item">
            <div class="info-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div class="info-text">PB 4273, Panampilly Nagar<br/>Pincode 682036<br/>Kochi, Kerala</div>
          </div>
          <div class="info-item">
            <div class="info-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </div>
            <div class="info-text">+91 8330 833330</div>
          </div>
          <div class="info-item">
            <div class="info-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </div>
            <div class="info-text"><a href="mailto:mail@gasuccessfactors.com">mail@gasuccessfactors.com</a></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-mount"></div>
  <script src="components.js?v=5"></script>
  <script src="content-loader.js?v=5"></script>
</body>
</html>
